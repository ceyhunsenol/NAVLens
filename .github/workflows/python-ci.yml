name: Python CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-package:
    name: Build native package and test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Show toolchains
        run: |
          python --version
          rustc --version
          cargo --version

      - name: Install development package
        run: python -m pip install -e ".[dev,research]"

      - name: Run Python tests
        run: python -m pytest

      - name: Run Ruff
        run: python -m ruff check python
